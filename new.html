<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT Kanji Reference — N5 · N4 · N3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Serif+JP:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f14;--surface:#18181f;--surface2:#22222c;--border:#2e2e3e;
  --text:#e8e8f0;--muted:#888899;
  --n5:#22c55e;--n4:#3b82f6;--n3:#f43f5e;
  --n5bg:#0d2218;--n4bg:#0d1a2e;--n3bg:#2a0d16;
  --n5border:#166534;--n4border:#1e40af;--n3border:#9f1239;
  --gold:#f59e0b;--radius:8px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:"Space Mono",monospace;min-height:100vh;overflow-x:hidden}

/* HERO */
.hero{background:linear-gradient(135deg,#0f0f14 0%,#1a0a2e 50%,#0f0f14 100%);border-bottom:1px solid var(--border);padding:48px 24px 36px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:"漢字";position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:240px;font-family:"Noto Serif JP",serif;color:rgba(255,255,255,0.02);pointer-events:none;white-space:nowrap}
.hero h1{font-family:"Noto Serif JP",serif;font-size:clamp(28px,5vw,52px);font-weight:700;letter-spacing:-0.02em;background:linear-gradient(135deg,#e8e8f0 0%,#a78bfa 50%,#38bdf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.hero p{color:var(--muted);font-size:14px;letter-spacing:0.1em;margin-bottom:28px}
.stats{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:8px;padding:8px 20px;border-radius:100px;font-size:13px;font-weight:700;letter-spacing:0.05em;border:1px solid}
.stat-pill.n5{background:var(--n5bg);border-color:var(--n5border);color:var(--n5)}
.stat-pill.n4{background:var(--n4bg);border-color:var(--n4border);color:var(--n4)}
.stat-pill.n3{background:var(--n3bg);border-color:var(--n3border);color:var(--n3)}
.stat-pill.total{background:#1a1a2e;border-color:#4a4a6a;color:var(--gold)}
.stat-dot{width:8px;height:8px;border-radius:50%;background:currentColor}

/* CONTROLS */
.controls{position:sticky;top:0;z-index:100;background:rgba(15,15,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px}
.controls-inner{max-width:1400px;margin:0 auto;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
#search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px 10px 38px;outline:none;transition:border-color .2s}
#search:focus{border-color:#6366f1}
#search::placeholder{color:var(--muted)}
.filter-btns{display:flex;gap:6px}
.filter-btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:.04em}
.filter-btn:hover{border-color:var(--muted);color:var(--text)}
.filter-btn.active-all{background:#3730a3;border-color:#6366f1;color:#a5b4fc}
.filter-btn.active-n5{background:var(--n5bg);border-color:var(--n5border);color:var(--n5)}
.filter-btn.active-n4{background:var(--n4bg);border-color:var(--n4border);color:var(--n4)}
.filter-btn.active-n3{background:var(--n3bg);border-color:var(--n3border);color:var(--n3)}
.view-btns{display:flex;gap:4px}
.view-btn{padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;transition:all .18s}
.view-btn.active{background:#1e1b4b;border-color:#6366f1;color:#a5b4fc}
.result-count{color:var(--muted);font-size:12px;white-space:nowrap;margin-left:auto}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:24px}

/* GRID */
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px}
.grid-view.hidden{display:none}
.kanji-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 14px 14px;cursor:default;transition:all .2s;position:relative;overflow:hidden}
.kanji-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.kanji-card.n5::before{background:var(--n5)}
.kanji-card.n4::before{background:var(--n4)}
.kanji-card.n3::before{background:var(--n3)}
.kanji-card:hover{transform:translateY(-2px);border-color:#4a4a6a;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.card-kanji{font-family:"Noto Serif JP",serif;font-size:48px;line-height:1;margin-bottom:8px;text-align:center}
.card-reading{font-size:11px;color:var(--muted);text-align:center;margin-bottom:6px;line-height:1.4}
.card-meaning{font-size:12px;color:var(--text);text-align:center;font-weight:700;margin-bottom:8px}
.card-example{background:var(--surface2);border-radius:6px;padding:6px 8px;text-align:center}
.card-ex-word{font-family:"Noto Sans JP",sans-serif;font-size:16px;display:block}
.card-ex-reading{font-size:10px;color:var(--muted);display:block}
.card-ex-en{font-size:10px;color:#6366f1;display:block}
.card-level-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;letter-spacing:.05em;padding:2px 6px;border-radius:4px}
.card-level-badge.n5{background:var(--n5bg);color:var(--n5)}
.card-level-badge.n4{background:var(--n4bg);color:var(--n4)}
.card-level-badge.n3{background:var(--n3bg);color:var(--n3)}

/* TABLE */
.table-view{display:none}
.table-view.active{display:block}
.kanji-table{width:100%;border-collapse:collapse;font-size:13px}
.kanji-table th{background:var(--surface2);padding:12px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);border-bottom:2px solid var(--border);position:sticky;top:57px;z-index:10}
.kanji-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.kanji-table tr:hover td{background:var(--surface)}
.tbl-kanji{font-family:"Noto Serif JP",serif;font-size:28px;line-height:1}
.tbl-reading{color:var(--muted);font-size:12px;line-height:1.5}
.tbl-meaning{font-weight:700}
.tbl-example{font-family:"Noto Sans JP",sans-serif;font-size:16px}
.tbl-ex-reading{font-size:11px;color:var(--muted)}
.tbl-en{color:#6366f1;font-size:12px}
.level-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700}
.level-badge.N5{background:var(--n5bg);color:var(--n5);border:1px solid var(--n5border)}
.level-badge.N4{background:var(--n4bg);color:var(--n4);border:1px solid var(--n4border)}
.level-badge.N3{background:var(--n3bg);color:var(--n3);border:1px solid var(--n3border)}

/* FLASHCARD */
.flashcard-view{display:none}
.flashcard-view.active{display:flex;flex-direction:column;align-items:center;gap:24px;padding:40px 0}
.flashcard-nav{display:flex;align-items:center;gap:16px;font-size:14px;color:var(--muted)}
.fc-btn{padding:10px 24px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:14px;cursor:pointer;transition:all .18s}
.fc-btn:hover{border-color:#6366f1;color:#a5b4fc}
.flashcard-wrap{perspective:1000px;width:min(480px,90vw);height:320px;cursor:pointer}
.flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--surface);border-radius:20px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:32px}
.fc-back{transform:rotateY(180deg);background:#0d1a2e;border-color:#1e40af}
.fc-big-kanji{font-family:"Noto Serif JP",serif;font-size:100px;line-height:1}
.fc-hint{font-size:12px;color:var(--muted);letter-spacing:.08em}
.fc-meaning{font-size:28px;font-weight:700;color:var(--text);text-align:center}
.fc-reading{font-size:18px;color:#60a5fa;text-align:center;font-family:"Noto Sans JP",sans-serif}
.fc-example{text-align:center}
.fc-ex-word{font-family:"Noto Sans JP",sans-serif;font-size:24px;display:block}
.fc-ex-reading{font-size:13px;color:var(--muted);display:block}
.fc-ex-en{font-size:13px;color:#6366f1;display:block}
.fc-progress{width:min(480px,90vw);background:var(--surface2);border-radius:100px;height:6px;overflow:hidden}
.fc-progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#38bdf8);border-radius:100px;transition:width .3s}
.fc-level-tag{padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700}
.fc-level-tag.N5{background:var(--n5bg);color:var(--n5);border:1px solid var(--n5border)}
.fc-level-tag.N4{background:var(--n4bg);color:var(--n4);border:1px solid var(--n4border)}
.fc-level-tag.N3{background:var(--n3bg);color:var(--n3);border:1px solid var(--n3border)}
.fc-controls{display:flex;gap:12px;align-items:center}
.fc-shuffle-btn{padding:8px 18px;border:1px solid var(--border);background:var(--surface2);border-radius:var(--radius);color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;transition:all .18s}
.fc-shuffle-btn:hover{color:var(--text);border-color:var(--muted)}

/* SECTION HEADERS */
.section-header{display:flex;align-items:center;gap:12px;padding:20px 0 12px;font-size:14px;font-weight:700;letter-spacing:.06em;grid-column:1/-1}
.section-header .sh-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.section-header .sh-line{flex:1;height:1px;background:var(--border)}
.section-header.n5{color:var(--n5)}.section-header.n4{color:var(--n4)}.section-header.n3{color:var(--n3)}
.sh-dot.n5{background:var(--n5)}.sh-dot.n4{background:var(--n4)}.sh-dot.n3{background:var(--n3)}

/* EMPTY */
.empty-state{text-align:center;padding:80px 24px;color:var(--muted);grid-column:1/-1}
.empty-kanji{font-size:64px;margin-bottom:16px;opacity:.3}
.empty-text{font-size:16px}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

@media(max-width:600px){
  .controls-inner{gap:8px}
  .filter-btns{gap:4px}
  .filter-btn{padding:7px 10px;font-size:12px}
  .grid-view{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .card-kanji{font-size:40px}
  .result-count{display:none}
}

/* TEST / QUIZ MODE */
.test-view{display:none}
.test-view.active{display:flex;flex-direction:column;align-items:center;gap:24px;padding:40px 0}
.test-setup{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:520px;width:90%;text-align:center}
.test-setup h2{font-family:"Noto Serif JP",serif;font-size:24px;margin-bottom:8px;background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.test-setup p{color:var(--muted);font-size:13px;margin-bottom:20px}
.test-opt-group{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;text-align:left}
.test-opt-label{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.test-opt-btns{display:flex;gap:8px;flex-wrap:wrap}
.test-opt-btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s}
.test-opt-btn:hover{border-color:var(--muted);color:var(--text)}
.test-opt-btn.sel{background:#1e1b4b;border-color:#6366f1;color:#a5b4fc}
.test-start-btn{padding:12px 40px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.04em}
.test-start-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.4)}
.test-area{max-width:560px;width:90%}
.test-hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px;color:var(--muted)}
.test-hud-score{display:flex;gap:16px}
.test-hud-correct{color:var(--n5)}
.test-hud-wrong{color:var(--n3)}
.test-progress{width:100%;background:var(--surface2);border-radius:100px;height:6px;overflow:hidden;margin-bottom:24px}
.test-progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);border-radius:100px;transition:width .3s}
.test-question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden;transition:border-color .3s}
.test-question-card.correct{border-color:var(--n5);box-shadow:0 0 30px rgba(34,197,94,.15)}
.test-question-card.wrong{border-color:var(--n3);box-shadow:0 0 30px rgba(244,63,94,.15)}
.test-q-level{position:absolute;top:12px;right:12px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700}
.test-q-level.N5{background:var(--n5bg);color:var(--n5);border:1px solid var(--n5border)}
.test-q-level.N4{background:var(--n4bg);color:var(--n4);border:1px solid var(--n4border)}
.test-q-level.N3{background:var(--n3bg);color:var(--n3);border:1px solid var(--n3border)}
.test-q-prompt{font-size:12px;color:var(--muted);letter-spacing:.08em;margin-bottom:12px}
.test-q-kanji{font-family:"Noto Serif JP",serif;font-size:72px;line-height:1.1;margin-bottom:8px}
.test-q-hint{font-size:13px;color:var(--muted);font-family:"Noto Sans JP",sans-serif;margin-bottom:4px}
.test-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.test-choice-btn{padding:14px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;cursor:pointer;transition:all .18s;text-align:center}
.test-choice-btn:hover:not(:disabled){border-color:#6366f1;background:var(--surface2);transform:translateY(-1px)}
.test-choice-btn:disabled{cursor:default}
.test-choice-btn.chosen-correct{background:var(--n5bg);border-color:var(--n5);color:var(--n5)}
.test-choice-btn.chosen-wrong{background:var(--n3bg);border-color:var(--n3);color:var(--n3)}
.test-choice-btn.reveal-correct{background:var(--n5bg);border-color:var(--n5);color:var(--n5)}
.test-next-btn{margin-top:12px;padding:10px 28px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s}
.test-next-btn:hover{border-color:#6366f1;color:#a5b4fc}
.test-result{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;max-width:480px;width:90%}
.test-result h2{font-family:"Noto Serif JP",serif;font-size:28px;margin-bottom:6px}
.test-result .test-score-big{font-size:64px;font-weight:700;background:linear-gradient(135deg,#6366f1,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:16px 0}
.test-result .test-stats{display:flex;justify-content:center;gap:24px;margin:16px 0 24px;font-size:14px}
.test-retry-btn{padding:12px 36px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.test-retry-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.4)}
.test-type-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:"Noto Sans JP",sans-serif;font-size:18px;outline:none;text-align:center;transition:border-color .2s}
.test-type-input:focus{border-color:#6366f1}
.test-submit-btn{margin-top:10px;padding:10px 28px;border:none;border-radius:var(--radius);background:#6366f1;color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s}
.test-submit-btn:hover{background:#4f46e5}
.test-feedback{margin-top:12px;font-size:14px;font-weight:700;min-height:22px}

@media(max-width:600px){
  .test-choices{grid-template-columns:1fr}
  .test-q-kanji{font-size:56px}
  .test-setup{padding:24px 16px}
}
</style>
</head>
<body>

<div class="hero">
  <h1>JLPT Kanji Reference</h1>
  <p>N5 · N4 · N3 — Complete Study Guide</p>
  <div class="stats">
    <div class="stat-pill n5"><span class="stat-dot"></span>N5: 100 Kanji</div>
    <div class="stat-pill n4"><span class="stat-dot"></span>N4: 180 Kanji</div>
    <div class="stat-pill n3"><span class="stat-dot"></span>N3: 372 Kanji</div>
    <div class="stat-pill total"><span class="stat-dot"></span>Total: 652</div>
  </div>
</div>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search kanji, reading, meaning, or English...">
    </div>
    <div class="filter-btns">
      <button class="filter-btn active-all" data-level="ALL">ALL</button>
      <button class="filter-btn" data-level="N5">N5</button>
      <button class="filter-btn" data-level="N4">N4</button>
      <button class="filter-btn" data-level="N3">N3</button>
    </div>
    <div class="view-btns">
      <button class="view-btn active" data-view="grid">⊞ Cards</button>
      <button class="view-btn" data-view="table">☰ Table</button>
      <button class="view-btn" data-view="flash">⟳ Flash</button>
      <button class="view-btn" data-view="test">✎ Test</button>
    </div>
    <span class="result-count" id="result-count">652 kanji</span>
  </div>
</div>

<div class="main">
  <div class="grid-view" id="grid-view"></div>

  <div class="table-view" id="table-view">
    <table class="kanji-table">
      <thead>
        <tr>
          <th>KANJI</th><th>READING</th><th>MEANING</th>
          <th>EXAMPLE</th><th>READING</th><th>ENGLISH</th><th>LEVEL</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div class="flashcard-view" id="flash-view">
    <div class="fc-progress"><div class="fc-progress-bar" id="fc-bar"></div></div>
    <div class="flashcard-nav">
      <button class="fc-btn" id="fc-prev">&#8592; Prev</button>
      <span id="fc-count">1 / 652</span>
      <button class="fc-btn" id="fc-next">Next &#8594;</button>
    </div>
    <div class="flashcard-wrap" id="fc-wrap">
      <div class="flashcard" id="flashcard">
        <div class="fc-face fc-front">
          <div class="fc-level-tag N5" id="fc-level-tag">N5</div>
          <div class="fc-big-kanji" id="fc-kanji">一</div>
          <div class="fc-hint">CLICK TO REVEAL</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-meaning" id="fc-meaning">one</div>
          <div class="fc-reading" id="fc-reading">いち・ひと</div>
          <div class="fc-example">
            <span class="fc-ex-word" id="fc-ex-word">一つ</span>
            <span class="fc-ex-reading" id="fc-ex-reading">ひとつ</span>
            <span class="fc-ex-en" id="fc-ex-en">one (thing)</span>
          </div>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-shuffle-btn" id="fc-shuffle">&#x21C4; Shuffle</button>
      <span style="color:var(--muted);font-size:11px">Space / Arrow keys to navigate</span>
    </div>
  </div>

  <div class="test-view" id="test-view"></div>
</div>

<script>
// ══════════════════════════════════

 "en": "efficiency", "level": "N3"}, {"k": "効", "r": "こう", "m": "effect / efficient", "ex": "効果", "er": "こうか", "en": "effect", "level": "N3"}, {"k": "果", "r": "か", "m": "result / effect", "ex": "効果", "er": "こうか", "en": "effect", "level": "N3"}, {"k": "損", "r": "そん", "m": "loss / damage", "ex": "損害", "er": "そんがい", "en": "damage", "level": "N3"}, {"k": "害", "r": "がい", "m": "harm / damage", "ex": "損害", "er": "そんがい", "en": "damage", "level": "N3"}, {"k": "補", "r": "おぎな・ほ", "m": "supplement / fill", "ex": "補助", "er": "ほじょ", "en": "subsidy / support", "level": "N3"}, {"k": "助", "r": "たす・じょ", "m": "help / assist", "ex": "補助", "er": "ほじょ", "en": "subsidy / support", "level": "N3"}];

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let filtered = [...KANJI];
let currentLevel = 'ALL';
let currentView = 'grid';
let searchQuery = '';
let fcIndex = 0;
let fcFlipped = false;
let fcData = [...KANJI];

// ══════════════════════════════════
// FILTER
// ══════════════════════════════════
function applyFilters() {
  const q = searchQuery.toLowerCase().trim();
  filtered = KANJI.filter(k => {
    const lvOk = currentLevel === 'ALL' || k.level === currentLevel;
    if (!lvOk) return false;
    if (!q) return true;
    return k.k.includes(q) || k.r.includes(q) ||
           k.m.toLowerCase().includes(q) ||
           k.ex.includes(q) || k.er.includes(q) ||
           k.en.toLowerCase().includes(q);
  });
  fcData = [...filtered];
  fcIndex = 0; fcFlipped = false;
  render();
}

// ══════════════════════════════════
// RENDER — GRID
// ══════════════════════════════════
function renderGrid() {
  const el = document.getElementById('grid-view');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-kanji">？</div><div class="empty-text">No kanji found</div></div>';
    return;
  }
  let html = '';
  if (currentLevel === 'ALL' && !searchQuery) {
    for (const lvl of ['N5','N4','N3']) {
      const grp = filtered.filter(k => k.level === lvl);
      if (!grp.length) continue;
      const lc = lvl.toLowerCase();
      html += `<div class="section-header ${lc}"><span class="sh-dot ${lc}"></span>${lvl} Kanji — ${grp.length} characters<span class="sh-line"></span></div>`;
      html += grp.map(cardHTML).join('');
    }
  } else {
    html = filtered.map(cardHTML).join('');
  }
  el.innerHTML = html;
}

function cardHTML(k) {
  const lv = k.level.toLowerCase();
  return `<div class="kanji-card ${lv}">
    <span class="card-level-badge ${lv}">${k.level}</span>
    <div class="card-kanji">${k.k}</div>
    <div class="card-reading">${k.r}</div>
    <div class="card-meaning">${k.m}</div>
    <div class="card-example">
      <span class="card-ex-word">${k.ex}</span>
      <span class="card-ex-reading">${k.er}</span>
      <span class="card-ex-en">${k.en}</span>
    </div>
  </div>`;
}

// ══════════════════════════════════
// RENDER — TABLE
// ══════════════════════════════════
function renderTable() {
  const tb = document.getElementById('table-body');
  if (!filtered.length) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:60px;color:var(--muted)">No kanji found</td></tr>';
    return;
  }
  tb.innerHTML = filtered.map(k => `
    <tr>
      <td><span class="tbl-kanji">${k.k}</span></td>
      <td><span class="tbl-reading">${k.r}</span></td>
      <td><span class="tbl-meaning">${k.m}</span></td>
      <td><span class="tbl-example">${k.ex}</span></td>
      <td><span class="tbl-ex-reading">${k.er}</span></td>
      <td><span class="tbl-en">${k.en}</span></td>
      <td><span class="level-badge ${k.level}">${k.level}</span></td>
    </tr>`).join('');
}

// ══════════════════════════════════
// RENDER — FLASHCARD
// ══════════════════════════════════
function renderFlash() {
  if (!fcData.length) return;
  const k = fcData[fcIndex];
  document.getElementById('fc-kanji').textContent = k.k;
  document.getElementById('fc-meaning').textContent = k.m;
  document.getElementById('fc-reading').textContent = k.r;
  document.getElementById('fc-ex-word').textContent = k.ex;
  document.getElementById('fc-ex-reading').textContent = k.er;
  document.getElementById('fc-ex-en').textContent = k.en;
  const tag = document.getElementById('fc-level-tag');
  tag.textContent = k.level;
  tag.className = 'fc-level-tag ' + k.level;
  document.getElementById('fc-count').textContent = `${fcIndex + 1} / ${fcData.length}`;
  document.getElementById('fc-bar').style.width = ((fcIndex + 1) / fcData.length * 100) + '%';
  document.getElementById('flashcard').classList.remove('flipped');
  fcFlipped = false;
}

// ══════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════
function render() {
  document.getElementById('result-count').textContent = filtered.length + ' kanji';
  if (currentView === 'grid') renderGrid();
  else if (currentView === 'table') renderTable();
  else renderFlash();
}

// ══════════════════════════════════
// VIEW SWITCH
// ══════════════════════════════════
function setView(v) {
  currentView = v;
  const gv = document.getElementById('grid-view');
  const tv = document.getElementById('table-view');
  const fv = document.getElementById('flash-view');
  const xv = document.getElementById('test-view');
  gv.className = 'grid-view' + (v === 'grid' ? '' : ' hidden');
  tv.className = 'table-view' + (v === 'table' ? ' active' : '');
  fv.className = 'flashcard-view' + (v === 'flash' ? ' active' : '');
  xv.className = 'test-view' + (v === 'test' ? ' active' : '');
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  if (v === 'test' && !testActive) renderTestSetup();
  render();
}

// ══════════════════════════════════
// EVENTS
// ══════════════════════════════════
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value; applyFilters();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLevel = btn.dataset.level;
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
    btn.classList.add(currentLevel === 'ALL' ? 'active-all' : 'active-' + currentLevel.toLowerCase());
    applyFilters();
  });
});

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => setView(btn.dataset.view));
});

document.getElementById('fc-wrap').addEventListener('click', () => {
  fcFlipped = !fcFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', fcFlipped);
});

document.getElementById('fc-prev').addEventListener('click', () => {
  if (fcIndex > 0) { fcIndex--; renderFlash(); }
});
document.getElementById('fc-next').addEventListener('click', () => {
  if (fcIndex < fcData.length - 1) { fcIndex++; renderFlash(); }
});

document.addEventListener('keydown', e => {
  if (currentView !== 'flash') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (fcIndex < fcData.length - 1) { fcIndex++; renderFlash(); }
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (fcIndex > 0) { fcIndex--; renderFlash(); }
  } else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    fcFlipped = !fcFlipped;
    document.getElementById('flashcard').classList.toggle('flipped', fcFlipped);
  }
});

document.getElementById('fc-shuffle').addEventListener('click', () => {
  for (let i = fcData.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcData[i], fcData[j]] = [fcData[j], fcData[i]];
  }
  fcIndex = 0; renderFlash();
});

// ══════════════════════════════════
// TEST / QUIZ ENGINE
// ══════════════════════════════════
let testActive = false;
let testLevel = 'ALL';
let testType = 'k2m';  // k2m, m2k, reading, type
let testCount = 10;
let testQuestions = [];
let testIdx = 0;
let testCorrect = 0;
let testWrong = 0;
let testAnswered = false;

function renderTestSetup() {
  const el = document.getElementById('test-view');
  el.innerHTML = `
    <div class="test-setup">
      <h2>漢字 Quiz</h2>
      <p>Test your kanji knowledge — choose your settings below</p>
      <div class="test-opt-group">
        <div class="test-opt-label">LEVEL</div>
        <div class="test-opt-btns" id="test-lvl-btns">
          <button class="test-opt-btn sel" data-val="ALL">All</button>
          <button class="test-opt-btn" data-val="N5">N5</button>
          <button class="test-opt-btn" data-val="N4">N4</button>
          <button class="test-opt-btn" data-val="N3">N3</button>
        </div>
      </div>
      <div class="test-opt-group">
        <div class="test-opt-label">QUIZ TYPE</div>
        <div class="test-opt-btns" id="test-type-btns">
          <button class="test-opt-btn sel" data-val="k2m">Kanji → Meaning</button>
          <button class="test-opt-btn" data-val="m2k">Meaning → Kanji</button>
          <button class="test-opt-btn" data-val="reading">Reading Quiz</button>
          <button class="test-opt-btn" data-val="type">Type Answer</button>
        </div>
      </div>
      <div class="test-opt-group">
        <div class="test-opt-label">QUESTIONS</div>
        <div class="test-opt-btns" id="test-cnt-btns">
          <button class="test-opt-btn" data-val="5">5</button>
          <button class="test-opt-btn sel" data-val="10">10</button>
          <button class="test-opt-btn" data-val="20">20</button>
          <button class="test-opt-btn" data-val="50">50</button>
        </div>
      </div>
      <button class="test-start-btn" id="test-start">Start Quiz</button>
    </div>`;
  // bind option buttons
  el.querySelectorAll('#test-lvl-btns .test-opt-btn').forEach(b => b.addEventListener('click', () => {
    testLevel = b.dataset.val;
    el.querySelectorAll('#test-lvl-btns .test-opt-btn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  el.querySelectorAll('#test-type-btns .test-opt-btn').forEach(b => b.addEventListener('click', () => {
    testType = b.dataset.val;
    el.querySelectorAll('#test-type-btns .test-opt-btn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  el.querySelectorAll('#test-cnt-btns .test-opt-btn').forEach(b => b.addEventListener('click', () => {
    testCount = parseInt(b.dataset.val);
    el.querySelectorAll('#test-cnt-btns .test-opt-btn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  document.getElementById('test-start').addEventListener('click', startTest);
}

function shuffle(a) { for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function startTest() {
  let pool = testLevel === 'ALL' ? [...KANJI] : KANJI.filter(k => k.level === testLevel);
  pool = shuffle(pool).slice(0, Math.min(testCount, pool.length));
  testQuestions = pool.map(q => {
    let choices = [];
    const others = KANJI.filter(k => k.k !== q.k);
    const picks = shuffle([...others]).slice(0, 3);
    if (testType === 'k2m') {
      choices = shuffle([q, ...picks].map(k => k.m));
    } else if (testType === 'm2k') {
      choices = shuffle([q, ...picks].map(k => k.k));
    } else if (testType === 'reading') {
      choices = shuffle([q, ...picks].map(k => k.r));
    }
    return { kanji: q, choices };
  });
  testIdx = 0; testCorrect = 0; testWrong = 0; testActive = true; testAnswered = false;
  renderTestQuestion();
}

function getCorrectAnswer(q) {
  if (testType === 'k2m') return q.kanji.m;
  if (testType === 'm2k') return q.kanji.k;
  if (testType === 'reading') return q.kanji.r;
  return q.kanji.m;
}

function renderTestQuestion() {
  if (testIdx >= testQuestions.length) { renderTestResult(); return; }
  testAnswered = false;
  const q = testQuestions[testIdx];
  const k = q.kanji;
  const el = document.getElementById('test-view');
  const prompt = testType === 'm2k' ? 'WHICH KANJI MEANS:' :
                 testType === 'reading' ? 'WHAT IS THE READING:' :
                 testType === 'type' ? 'TYPE THE MEANING:' : 'WHAT DOES THIS MEAN:';
  const display = testType === 'm2k' ? `<div class="test-q-kanji" style="font-family:inherit;font-size:22px;font-weight:700">${k.m}</div>` :
                  `<div class="test-q-kanji">${k.k}</div><div class="test-q-hint">${testType === 'reading' ? '' : k.r}</div>`;
  let answerHTML = '';
  if (testType === 'type') {
    answerHTML = `<input type="text" class="test-type-input" id="test-type-input" placeholder="Type the meaning in English..." autocomplete="off">
      <button class="test-submit-btn" id="test-submit">Check</button>
      <div class="test-feedback" id="test-feedback"></div>`;
  } else {
    answerHTML = `<div class="test-choices" id="test-choices">${q.choices.map((c,i) =>
      `<button class="test-choice-btn" data-idx="${i}">${c}</button>`).join('')}</div>`;
  }
  el.innerHTML = `
    <div class="test-area">
      <div class="test-hud">
        <span>Question ${testIdx+1} / ${testQuestions.length}</span>
        <div class="test-hud-score">
          <span class="test-hud-correct">✓ ${testCorrect}</span>
          <span class="test-hud-wrong">✗ ${testWrong}</span>
        </div>
      </div>
      <div class="test-progress"><div class="test-progress-bar" style="width:${(testIdx/testQuestions.length)*100}%"></div></div>
      <div class="test-question-card" id="test-qcard">
        <span class="test-q-level ${k.level}">${k.level}</span>
        <div class="test-q-prompt">${prompt}</div>
        ${display}
      </div>
      ${answerHTML}
    </div>`;
  if (testType === 'type') {
    const inp = document.getElementById('test-type-input');
    inp.focus();
    const submitTyped = () => {
      if (testAnswered) return;
      testAnswered = true;
      const ans = inp.value.trim().toLowerCase();
      const correct = k.m.toLowerCase();
      const isRight = correct.includes(ans) && ans.length > 0;
      const fb = document.getElementById('test-feedback');
      const qc = document.getElementById('test-qcard');
      if (isRight) { testCorrect++; fb.style.color='var(--n5)'; fb.textContent='✓ Correct!'; qc.classList.add('correct'); }
      else { testWrong++; fb.style.color='var(--n3)'; fb.textContent='✗ Answer: '+k.m; qc.classList.add('wrong'); }
      inp.disabled = true;
      setTimeout(() => { testIdx++; renderTestQuestion(); }, 1200);
    };
    document.getElementById('test-submit').addEventListener('click', submitTyped);
    inp.addEventListener('keydown', e => { if(e.key==='Enter') submitTyped(); });
  } else {
    const correct = getCorrectAnswer(testQuestions[testIdx]);
    document.querySelectorAll('.test-choice-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (testAnswered) return;
        testAnswered = true;
        const isRight = btn.textContent === correct;
        const qc = document.getElementById('test-qcard');
        if (isRight) { testCorrect++; btn.classList.add('chosen-correct'); qc.classList.add('correct'); }
        else { testWrong++; btn.classList.add('chosen-wrong'); qc.classList.add('wrong');
          document.querySelectorAll('.test-choice-btn').forEach(b => { if(b.textContent===correct) b.classList.add('reveal-correct'); });
        }
        document.querySelectorAll('.test-choice-btn').forEach(b => b.disabled = true);
        setTimeout(() => { testIdx++; renderTestQuestion(); }, 1000);
      });
    });
  }
}

function renderTestResult() {
  testActive = false;
  const total = testCorrect + testWrong;
  const pct = Math.round((testCorrect / total) * 100);
  const grade = pct >= 90 ? '🏆 Excellent!' : pct >= 70 ? '🎉 Great job!' : pct >= 50 ? '👍 Good effort' : '📖 Keep studying!';
  const el = document.getElementById('test-view');
  el.innerHTML = `
    <div class="test-result">
      <h2>${grade}</h2>
      <div class="test-score-big">${pct}%</div>
      <div class="test-stats">
        <span style="color:var(--n5)">✓ ${testCorrect} correct</span>
        <span style="color:var(--n3)">✗ ${testWrong} wrong</span>
      </div>
      <p style="color:var(--muted);font-size:13px;margin-bottom:20px">${testCorrect} out of ${total} questions</p>
      <button class="test-retry-btn" id="test-retry">Try Again</button>
    </div>`;
  document.getElementById('test-retry').addEventListener('click', () => {
    testActive = false;
    renderTestSetup();
  });
}

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
applyFilters();
</script>
</body>
</html>
